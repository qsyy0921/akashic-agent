services:
  napcat:
    image: ${NAPCAT_IMAGE:-mlikiowa/napcat-docker:v4.8.119}
    container_name: napcat_2365524513
    restart: always
    env_file:
      - ../.env
    privileged: true
    ports:
      - "3002:3002"
      - "6099:6099"
    environment:
      - TZ=Asia/Shanghai
      - NAPCAT_UID=1000
      - NAPCAT_GID=1000
      - ACCOUNT=2365524513
    volumes:
      - ./napcat-entrypoint.custom.sh:/app/entrypoint.sh:ro
      - E:/agent/akashic/runtime/napcat/QQ:/app/.config/QQ
      - E:/agent/akashic/runtime/napcat/config:/app/napcat/config
      - E:/agent/akashic/runtime/napcat/logs:/app/napcat/logs
